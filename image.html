<style>



/* Fade Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ================= GALLERY ================= */

.gallery{
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    cursor:pointer;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:transform 0.5s ease;
}

/* Overlay */
.card::after{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    letter-spacing:2px;
    opacity:0;
    transition:0.5s;
}

.card:hover img{
    transform:scale(1.2);
}

.card:hover::after{
    opacity:1;
}

      footer{
    text-align:center;
    padding:25px;
    background:#001a33;
    margin-top:50px;
    font-family: 'Segoe UI', sans-serif;
}
